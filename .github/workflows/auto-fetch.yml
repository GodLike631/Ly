name: 自动双源无损强行合并-备用线

on:
  schedule:
    - cron: '43 0,12 * * *'
  workflow_dispatch: 

# ✨ 双重保险：在代码中强制声明该工作流拥有写权限
permissions:
  contents: write

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4
      with:
        # 使用当前工作流的 Token 进行鉴权
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/海豚666.json" -o datas/haitun.json
        curl -L "https://gh-proxy.com/https://raw.githubusercontent.com/ediart/tvbox/refs/heads/main/lz/py.json" -o datas/lz.json

    - name: Text Merge JSON
      run: |
        # 💡 提示：如果你的 Python 脚本文件名是 ly.py，请把下行改为 python ly.py
        python modify_config.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 追踪所有新生成的文件和旧线大轰炸后的过期文件
        git add datas/控制开关.txt
        git add datas/最新接口文件名.txt
        git add datas/蝴蝶影视*.json
        git add datas/老杨TV*.json
        
        if git diff-index --quiet HEAD; then
          echo "文件没有变化，无需更新。"
        else
          git commit -m "双源自适应硬核合并 (蝴蝶影视全量版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          # 🚀 强制指定推送到当前分支
          git push origin HEAD:${{ github.ref_name }}
        fi
