name: M3U IPTV Auto Check & Clean Workflow

on:
  schedule:
    # 每 3 天在 UTC 时间 20:00 (即北京时间早晨 04:00) 自动定时巡检
    - cron: '0 20 */3 * *'
  workflow_dispatch: # 支持手动点击触发运行

jobs:
  inspect-and-clean:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 明确赋予写权限，以便自动提交更新文件

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3

    - name: Restore cache file
      uses: actions/cache@v4
      with:
        path: datas/cache.json
        key: iptv-cache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          iptv-cache-${{ runner.os }}-

    - name: Run M3U Cleaner Script
      run: |
        python m3u_cleaner.py

    - name: Commit and push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto update M3U playlist and test cache [skip ci]"
        branch: main
        file_pattern: 'datas/custom_lives.m3u datas/cache.json'
        commit_user_name: 'github-actions[bot]'
        commit_user_email: 'github-actions[bot]@users.noreply.github.com'
