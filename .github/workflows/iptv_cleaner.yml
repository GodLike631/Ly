name: Auto Clean IPTV Streams

on:
  schedule:
    # ⏱️ 定时任务：每天北京时间早上 6 点自动运行一次 (CRON 格式，基于 UTC 时间)
    - cron: '0 22 * * *'
  workflow_dispatch: # 👈 允许你在 GitHub 网页上手动点击按钮立即触发运行

jobs:
  clean_iptv:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 安装 Python 3.10 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装 Linux 系统的 FFmpeg/FFprobe
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 4. 安装 Python 依赖包
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 5. 执行 IPTV 异步清洗主程序
      - name: Run IPTV Cleaner
        run: |
          python iptv_cleaner.py

      # 6. 自动提交修改并推送到 GitHub 仓库
      - name: Commit & Push Updated Files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datas/custom_lives.m3u datas/cache.db
          
          # 判断是否有更新，如果有修改则自动 Commit 提交
          if git diff --staged --quiet; then
            echo "没有检测到线路变更，跳过提交。"
          else
            git commit -m "chore: 🤖 [Auto] 自动巡检清洗与 M3U 优选更新"
            git push
          fi
