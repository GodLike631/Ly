name: Auto Clean IPTV Streams

on:
  schedule:
    # ⏱️ 每天北京时间早上 6 点自动运行
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许网页手动触发

jobs:
  clean_iptv:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取 Live 分支的代码 (关键修复点 🎯)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: Live

      # 2. 配置 Python 3.10 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装 FFmpeg / FFprobe 工具
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 4. 安装 Python 依赖库
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 5. 运行异步巡检主程序
      - name: Run IPTV Cleaner
        run: |
          python iptv_cleaner.py

      # 6. 提交更新后的文件并推送到 Live 分支
      - name: Commit & Push Updated Files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datas/
          
          if git diff --staged --quiet; then
            echo "没有检测到线路更新，跳过提交。"
          else
            git commit -m "chore: 🤖 [Auto] 自动巡检清洗与 M3U 优选更新"
            git push origin Live
          fi
