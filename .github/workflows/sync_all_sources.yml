name: 自动同步多路电视直播源

on:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨 04:00 自动运行
  workflow_dispatch:     # 允许手动点击按钮立即运行

jobs:
  sync_sources:
    runs-on: ubuntu-latest

    steps:
    - name: 检出当前仓库
      uses: actions/checkout@v4
      with:
        ref: Live # 明确指定检出 Live 分支

    - name: 创建并下载所有电视源
      run: |
        mkdir -p tv_sources
        cd tv_sources

        echo "开始下载所有源..."

        # 1. sese.txt
        curl -sL "https://raw.githubusercontent.com/807080747/zv/refs/heads/main/sese.txt" -o "sese.txt"

        # 2. mit (假设为 txt)
        curl -sL "https://raw.githubusercontent.com/fleung49/star/refs/heads/main/mit" -o "mit.txt"

        # 3. dsjcs.txt
        curl -sL "https://raw.githubusercontent.com/bang359/dsj/raw/main/dsjcs.txt" -o "dsjcs.txt"

        # 4. interface.txt
        curl -sL "https://raw.githubusercontent.com/develop202/migu_video/refs/heads/main/interface.txt" -o "interface.txt"

        # 5. result.m3u
        curl -sL "https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/ipv4/result.m3u" -o "guovin_result.m3u"

        # 6. xnkl.txt
        curl -sL "https://feer-cdn-bp.xpnb.qzz.io/xnkl.txt" -o "xnkl.txt"

        # 7. test_channels_taiwan.m3u
        curl -sL "https://epg.pw/test_channels_taiwan.m3u" -o "taiwan_test.m3u"

        # 8. fwc.m3u (来自独立服务器IP)
        curl -sL --connect-timeout 15 "http://82.156.243.185:33389/fwc.m3u" -o "fwc.m3u" || echo "82.156.243.185 下载失败，跳过"

        # 9. all_merged.m3u
        curl -sL "https://raw.githubusercontent.com/xJEYDAin/iptv/main/output/all_merged.m3u" -o "all_merged.m3u"

        # 10. unifi.txt
        curl -sL "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/unifi.txt" -o "unifi.txt"

        # 11. Jsnzkpg1.m3u
        curl -sL "https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg1.m3u" -o "Jsnzkpg1.m3u"

        # 12. Gather.m3u
        curl -sL "https://iptv.yang-1989.eu.org/m3u/Gather.m3u" -o "Gather.m3u"

        # 13. live.m3u
        curl -sL "https://cdn.qd.je/live.m3u" -o "qd_live.m3u"

        # 14. 新加坡.m3u
        curl -sL "http://xtvantsc.xyz/%E6%96%B0%E5%8A%A0%E5%9D%A1.m3u" -o "singapore.m3u" || echo "新加坡源下载失败"

        # 15. 黄蚂蚁先锋推流源.txt
        curl -sL "http://ge.html-5.me//ii/%E9%BB%84%E9%A1%B9%E8%9A%81%E5%85%88%E9%94%8B%E6%8E%A8%E6%B5%81%E6%BA%90.txt" -o "huangmayi.txt" || echo "黄蚂蚁源下载失败"

        # 16. FYTV.txt
        curl -sL "http://iptv.4666888.xyz/FYTV.txt" -o "FYTV.txt"

        # 17. yiyifafa.txt
        curl -sL "https://raw.githubusercontent.com/fafa002/yf2025/refs/heads/main/yiyifafa.txt" -o "yiyifafa.txt"

        # 18. ilook 接口
        curl -sL "https://ilook.epg.one/EDTZN7ANS84N86" -o "ilook_epg.txt"

        # 19. 985云盘网盘跳转文件
        curl -sL "https://www.985pan.com/down.php/bf5e9607ff407fcdd71f63928ea5bc79.txt" -o "985pan_source.txt"

        # 20. tv.m3u
        curl -sL "http://tv123.vvvv.ee/tv.m3u" -o "tv123.m3u"

        # 21. playlist_all.txt
        curl -sL "https://t.freetv.fun/m3u/playlist_all.txt" -o "freetv_playlist_all.txt"

        # 22. 4gtv.txt (来自 FGBLH)
        curl -sL "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/4gtv.txt" -o "fgblh_4gtv.txt"

        # 23. 4gtv.txt (来自 xtvantsc)
        curl -sL "http://xtvantsc.xyz/4gtv.txt" -o "xtvantsc_4gtv.txt"

        # 24. 4gtv_api.php
        curl -sL "https://ha.msbot.dpdns.org/4gtv_api.php" -o "msbot_4gtv_api.txt"

        # 25. 安博.txt
        curl -sL "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/%E5%AE%89%E5%8D%9A.txt" -o "anbo.txt" || echo "安博源下载失败"

        # 26. jackTV.m3u
        curl -sL "https://php.946985.filegear-sg.me/jackTV.m3u" -o "jackTV.m3u"

        echo "所有文件下载尝试完毕。"

    - name: 提交并推送到我的仓库 Live 分支
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        if [ -n "$(git status --porcelain)" ]; then
          git add tv_sources/
          git commit -m "自动同步：更新 26 路电视源数据至 Live 分支 [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push origin Live
        else
          echo "所有源文件内容均未发生变化，跳过本次提交。"
        fi
