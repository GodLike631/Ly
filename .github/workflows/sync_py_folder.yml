name: Sync Remote Py Folder

on:
  schedule:
    # 每天 UTC 0:00 (北京时间 08:00) 自动定时运行
    - cron: '0 0 * * *'
  # 允许在 GitHub 网页界面手动点击按钮立即触发同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 明确检出你仓库的 Live 分支
      - name: Checkout My Repo (Live Branch)
        uses: actions/checkout@v4
        with:
          ref: Live

      # 2. 稀疏拉取对方仓库的 py 文件夹并同步到本地 py 目录
      - name: Download Remote Py Folder
        run: |
          # 确保当前 Live 分支下 py 文件夹必定存在
          mkdir -p py
          
          # 创建临时文件夹拉取对方代码
          mkdir -p temp_upstream
          cd temp_upstream
          git init
          git remote add origin https://github.com/FGBLH/HKL.git
          git config core.sparseCheckout true
          echo "py/" >> .git/info/sparse-checkout
          git pull origin main
          cd ..
          
          # 将拉取到的文件同步复制到 Live 分支的 py 文件夹中
          cp -rf temp_upstream/py/. py/
          
          # 清理临时文件夹
          rm -rf temp_upstream

      # 3. 检查是否有新文件或更新，自动 Commit 并 Push 回 Live 分支
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 暂存 py 目录下的所有变动
          git add py/
          
          # 判断是否有代码变更，防止空提交报错
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto sync py folder from FGBLH/HKL"
            git push
            echo "同步成功并更新到 Live 分支！"
          else
            echo "没有检测到任何文件更新，跳过 Commit。"
          fi
