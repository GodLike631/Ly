name: Sync Remote Py Folder

on:
  schedule:
    # 每天 UTC 0:00 (北京时间 08:00) 自动定时运行
    - cron: '0 0 * * *'
  # 允许在 GitHub 网页界面手动点击按钮立即触发同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出你自己的仓库代码
      - name: Checkout My Repo
        uses: actions/checkout@v4

      # 2. 稀疏拉取对方仓库的 py 文件夹并覆盖保存到本地 py 目录
      - name: Download Remote Py Folder
        run: |
          # 创建临时文件夹并进入
          mkdir -p temp_upstream
          cd temp_upstream
          
          # 初始化 git 稀疏检出
          git init
          git remote add origin https://github.com/FGBLH/HKL.git
          git config core.sparseCheckout true
          echo "py/" >> .git/info/sparse-checkout
          
          # 拉取主分支代码
          git pull origin main
          
          # 回到根目录，将拉取到的 py 文件夹内容复制并覆盖到你仓库的 py 目录
          cd ..
          cp -rf temp_upstream/py/* py/
          
          # 清理临时文件夹
          rm -rf temp_upstream

      # 3. 检查是否有新文件或更新，自动 Commit 并 Push
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 暂存 py 目录下的所有变动
          git add py/
          
          # 判断是否有代码变更，防止空提交报错
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto sync py folder from FGBLH/HKL"
            git push
            echo "同步成功并更新到仓库！"
          else
            echo "没有检测到任何文件更新，跳过 Commit。"
          fi
